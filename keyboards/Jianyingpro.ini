Description=

[Keys]
空格=播放/暂停
Ctrl+B=分割
Ctrl+C=复制
Ctrl+V=粘贴
Ctrl+X=剪切
Delete=删除
Backspace=删除
Ctrl+Z=撤销
Ctrl+Shift+Z=恢复
Ctrl+S=保存
Ctrl+N=新建草稿
Ctrl+I=导入素材
Ctrl+E=导出
Ctrl+Q=退出
Ctrl+J=手动踩点/关键帧
