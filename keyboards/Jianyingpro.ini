Tab=切换素材面板
N=吸附开关
Ctrl+F=全屏/退出全屏
长按Ctrl=取消对齐
←=上一帧
→=下一帧
↑=上一分割点
↓=下一分割点
Ctrl+G=创建组合
Ctrl+Shift+G=解除组合
Ctrl+Shift+B=批量分割